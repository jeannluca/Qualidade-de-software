<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="calculator">
            <h1>Calculadora Financeira</h1>

            <div class="input-group">
                <label for="valor1">Valor 1 (R$)</label>
                <input type="number" id="valor1" step="0.01" placeholder="0,00" required>
            </div>

            <div class="input-group">
                <label for="valor2">Valor 2 (R$)</label>
                <input type="number" id="valor2" step="0.01" placeholder="0,00" required>
            </div>

            <div class="buttons">
                <button data-op="+">+</button>
                <button data-op="-">−</button>
                <button data-op="*">×</button>
                <button data-op="/">÷</button>
            </div>

            <div class="result">
                <span>Resultado:</span>
                <strong id="resultado">R$ 0,00</strong>
            </div>

            <p id="erro" class="erro"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
